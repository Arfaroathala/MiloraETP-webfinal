<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — Milora Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --cream:#FAF6EE;--cream-dark:#F2EAD8;--gold:#C9A84C;
  --gold-light:#E8C97A;--gold-dark:#A07830;--wood:#7B4F2E;
  --wood-light:#A0714F;--brown-text:#3E2A14;--warm-white:#FFFCF5;
  --border:#D4B483;--shadow:rgba(123,79,46,0.15);
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--cream);color:var(--brown-text);min-height:100vh;}
.container{max-width:900px;margin:0 auto;padding:24px;}

/* LOGIN SCREEN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--warm-white);border:1px solid var(--border);border-radius:24px;padding:40px 32px;max-width:380px;width:100%;box-shadow:0 20px 60px var(--shadow);text-align:center;}
.login-card img{width:72px;height:72px;object-fit:contain;margin:0 auto 16px;display:block;}
.login-card h1{font-family:var(--font-display);font-size:22px;color:var(--brown-text);margin-bottom:4px;}
.login-card p{font-size:13px;color:var(--wood-light);margin-bottom:28px;}
.inp{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-family:var(--font-body);font-size:14px;color:var(--brown-text);background:white;outline:none;margin-bottom:14px;transition:border-color .2s;}
.inp:focus{border-color:var(--gold);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--wood),var(--gold-dark));color:white;border:none;padding:14px;border-radius:12px;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.9;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.login-err{font-size:12px;color:#C62828;margin-top:12px;display:none;background:#FFEBEE;border:1px solid #FFCDD2;border-radius:8px;padding:8px 12px;}
.login-err.show{display:block;}

/* DASHBOARD */
#dashboard{display:none;}
.dash-header{background:linear-gradient(135deg,var(--wood),var(--gold-dark));padding:20px 0;position:sticky;top:0;z-index:100;}
.dash-header-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;padding:0 24px;}
.dash-brand{display:flex;align-items:center;gap:12px;}
.dash-brand img{width:40px;height:40px;object-fit:contain;}
.dash-brand-text{color:white;}
.dash-brand-text .t1{font-family:var(--font-display);font-size:17px;font-weight:700;}
.dash-brand-text .t2{font-size:11px;opacity:.8;}
.btn-logout{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:20px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;}
.btn-logout:hover{background:rgba(255,255,255,.25);}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0;}
.stat-card{background:var(--warm-white);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;}
.stat-card .sv{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--gold-dark);}
.stat-card .sl{font-size:11px;color:var(--wood-light);margin-top:4px;}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.toolbar h2{font-family:var(--font-display);font-size:19px;color:var(--brown-text);}
.btn-refresh{background:var(--gold-dark);color:white;border:none;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-refresh:hover{background:var(--wood);}
.btn-refresh:disabled{opacity:.5;}

.order-card{background:var(--warm-white);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
.order-code{display:inline-block;background:var(--gold-dark);color:white;font-weight:700;letter-spacing:.08em;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:6px;}
.order-cust{font-size:15px;color:var(--brown-text);font-weight:700;}
.order-time{font-size:11px;color:var(--wood-light);}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.status-pending{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;}
.status-confirmed{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9;}
.status-completed{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;}
.status-no_show{background:#EFEBE9;color:#6D4C41;border:1px solid #BCAAA4;}
.status-cancelled{background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;}
.order-body{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;}
.order-items{font-size:13px;color:var(--brown-text);line-height:1.8;}
.order-items .oi-sauce{color:var(--gold-dark);font-size:11.5px;}
.order-note{font-size:12px;color:var(--wood-light);margin-top:8px;font-style:italic;}
.order-total-line{font-weight:700;color:var(--gold-dark);font-size:15px;margin-top:10px;}
.order-proof{width:90px;height:90px;border-radius:12px;object-fit:cover;border:2px solid var(--border);cursor:pointer;flex-shrink:0;}
.order-proof-missing{width:90px;height:90px;border-radius:12px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--wood-light);text-align:center;flex-shrink:0;padding:6px;}
.order-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn-status{border:1.5px solid var(--border);background:white;color:var(--wood);padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-status:hover{background:var(--cream-dark);}
.btn-status.active{background:var(--gold-dark);color:white;border-color:var(--gold-dark);}
.btn-status.danger{color:#C62828;border-color:#EF9A9A;}
.btn-status.danger.active{background:#C62828;color:white;border-color:#C62828;}
.btn-status.neutral{color:#6D4C41;border-color:#BCAAA4;}
.btn-status.neutral.active{background:#6D4C41;color:white;border-color:#6D4C41;}
.order-phone{font-size:12px;color:var(--wood-light);margin-top:2px;}
.btn-chat-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:white;border:none;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-chat-wa:hover{opacity:.9;}
.pickup-info{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12.5px;color:var(--brown-text);line-height:1.7;}
.pickup-info b{color:var(--wood);}
.student-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-left:8px;}
.search-filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-input{flex:2;min-width:200px;border:1.5px solid var(--border);border-radius:12px;padding:11px 16px;font-family:var(--font-body);font-size:13px;background:white;color:var(--brown-text);outline:none;}
.search-input:focus{border-color:var(--gold);}
.status-filter{flex:1;min-width:140px;border:1.5px solid var(--border);border-radius:12px;padding:11px 12px;font-family:var(--font-body);font-size:13px;background:white;color:var(--brown-text);outline:none;cursor:pointer;}
.date-group-header{display:flex;align-items:center;gap:10px;margin:24px 0 14px;padding:10px 16px;border-radius:12px;font-family:var(--font-display);font-weight:700;font-size:15px;}
.date-group-header.today{background:linear-gradient(135deg,var(--wood),var(--gold-dark));color:white;}
.date-group-header.tomorrow{background:rgba(201,168,76,.2);color:var(--wood);border:1.5px solid var(--gold);}
.date-group-header.later{background:var(--cream-dark);color:var(--wood-light);border:1px solid var(--border);}
.date-group-header.noinfo{background:#F5F5F5;color:#999;border:1px dashed #CCC;}
.date-group-count{margin-left:auto;font-size:12px;font-weight:600;opacity:.85;}
.student-yes{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9;}
.student-no{background:#F3E5F5;color:#6A1B9A;border:1px solid #CE93D8;}

.empty-state{text-align:center;padding:60px 20px;color:var(--wood-light);}
.empty-state .ei{font-size:48px;margin-bottom:12px;}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:85vh;border-radius:12px;}
.lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:white;border:none;border-radius:50%;font-size:18px;cursor:pointer;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown-text);color:white;padding:13px 22px;border-radius:14px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:transform .3s,opacity .3s;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

.order-toggle-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--warm-white);border:1.5px solid var(--border);border-radius:16px;padding:14px 18px;margin-bottom:20px;flex-wrap:wrap;}
.otb-text{font-size:13px;color:var(--brown-text);font-weight:600;}
.otb-sub{font-size:11.5px;color:var(--wood-light);font-weight:400;margin-top:2px;}
.btn-toggle-order{border:none;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:white;}
.btn-toggle-order.is-open{background:#2E7D32;}
.btn-toggle-order.is-closed{background:#C62828;}
.btn-toggle-order:disabled{opacity:.6;cursor:not-allowed;}

@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr;}
  .order-body{grid-template-columns:1fr;}
  .order-proof,.order-proof-missing{width:100%;height:140px;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-header-inner">
      <div class="dash-brand">
        <!-- TODO: ganti balik ke <img src="data:image/webp;base64,....." alt="Milora"/> yang asli dari admin.html kamu, ini di-placeholder-in sementara oleh Claude -->
    <img src="milora-logo.webp" alt="Milora"/>
        <div class="dash-brand-text">
          <div class="t1">Admin Panel</div>
          <div class="t2">Milora Enterprise</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card"><div class="sv" id="stTotal">0</div><div class="sl">Total Pesanan</div></div>
      <div class="stat-card"><div class="sv" id="stRev">Rp0</div><div class="sl">Total Revenue</div></div>
      <div class="stat-card"><div class="sv" id="stItems">0</div><div class="sl">Item Terjual</div></div>
    </div>

      <div>
        <div class="otb-text" id="otbText">Memuat status pemesanan...</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
  <img id="lbImg" src="" alt="Bukti pembayaran"/>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://sixwcjbhqydufapxftip.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpeHdjamJocXlkdWZhcHhmdGlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDQ5MDMsImV4cCI6MjA5OTAyMDkwM30.zBNVRIKoypww2mDLeVJXZPbfheNPJ2VFV_Rs44jfChQ';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var currentOrders = [];
var filteredOrders = [];
var manualClosedState = false;

function rp(n){ return 'Rp' + Number(n).toLocaleString('id-ID'); }

function formatWaLink(phone){
  if(!phone) return null;
  var digits = phone.replace(/[^0-9]/g,'');
  if(digits.charAt(0) === '0') digits = '62' + digits.substring(1);
  else if(digits.substring(0,2) !== '62') digits = '62' + digits;
  return 'https://wa.me/' + digits;
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ============ ORDER TOGGLE (manual_closed) ============
function renderToggleButton(){
  var btn = document.getElementById('btnToggleOrder');
  var txt = document.getElementById('otbText');
  btn.disabled = false;
  if(manualClosedState){
    btn.textContent = 'Buka Order';
    btn.className = 'btn-toggle-order is-closed';
    txt.textContent = 'Status: DITUTUP MANUAL';
  } else {
    btn.textContent = 'Tutup Sementara';
    btn.className = 'btn-toggle-order is-open';
    txt.textContent = 'Status: TERBUKA untuk customer';
  }
}

function loadManualClosedState(){
  sb.from('settings').select('value').eq('key','manual_closed').maybeSingle().then(function(res){
    manualClosedState = !!(res.data && res.data.value === true);
    renderToggleButton();
  });
}

function toggleManualClosed(){
  var btn = document.getElementById('btnToggleOrder');
  btn.disabled = true;
  var next = !manualClosedState;
  sb.from('settings').update({ value: next }).eq('key','manual_closed').then(function(res){
    if(res.error){
      showToast('Gagal ubah status: ' + res.error.message);
      btn.disabled = false;
      return;
    }
    manualClosedState = next;
    renderToggleButton();
    showToast(next ? 'Order ditutup sementara untuk customer.' : 'Order dibuka lagi untuk customer.');
  });
}

// ============ AUTH ============
function doLogin(){
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginErr');
  var btn = document.getElementById('loginBtn');
  errEl.classList.remove('show');

  if(!email || !pass){
    errEl.textContent = 'Isi email dan password dulu.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memeriksa...';

  sb.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
    btn.disabled = false;
    btn.textContent = 'Masuk';
    if(res.error){
      var m = res.error.message || '';
      if(m.indexOf('Load failed') > -1 || m.indexOf('fetch') > -1 || m.indexOf('Network') > -1){
        errEl.textContent = 'Tidak bisa terhubung ke server. Pastikan halaman ini dibuka lewat link website (bukan file lokal), dan cek koneksi internet.';
      } else {
        errEl.textContent = 'Email atau password salah.';
      }
      errEl.classList.add('show');
      return;
    }
    showDashboard();
  }).catch(function(err){
    btn.disabled = false;
    btn.textContent = 'Masuk';
    errEl.textContent = 'Tidak bisa terhubung ke server. Pastikan halaman ini dibuka lewat link website (bukan file lokal), dan cek koneksi internet.';
    errEl.classList.add('show');
  });
}

function doLogout(){
  sb.auth.signOut().then(function(){
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
  });
}

function showDashboard(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOrders();
  loadManualClosedState();
}

// Check existing session on page load
sb.auth.getSession().then(function(res){
  if(res.data && res.data.session){
    showDashboard();
  }
});

// ============ ORDERS ============
function exportToExcel(){
  if(currentOrders.length === 0){ showToast('Tidak ada data untuk di-export'); return; }

  var headers = ['Nomor Antrian','Kode Pesanan','Nama Customer','No WhatsApp','Status','Mahasiswa Gundar','Pick Up Lokasi','Alamat','Waktu Pick Up','Items','Subtotal','Diskon','Total','Catatan','Waktu Order'];
  var rows = [headers];

  for(var i=0;i<currentOrders.length;i++){
    var o = currentOrders[i];
    var itemsText = '';
    if(Array.isArray(o.items)){
      for(var j=0;j<o.items.length;j++){
        var it = o.items[j];
        itemsText += it.name;
        if(it.coating) itemsText += ' (Coating: '+it.coating+')';
        if(it.filling) itemsText += ' (Filling: '+it.filling+')';
        if(j < o.items.length-1) itemsText += ' | ';
      }
    }
    var studentText = o.is_student === true ? 'Ya' : (o.is_student === false ? 'Tidak' : '');
    var pickupTimeText = '';
    if(o.pickup_datetime){
      try { pickupTimeText = new Date(o.pickup_datetime).toLocaleString('id-ID'); } catch(e){ pickupTimeText = o.pickup_datetime; }
    }
    var orderTimeText = '';
    try { orderTimeText = new Date(o.created_at).toLocaleString('id-ID'); } catch(e){ orderTimeText = o.created_at; }

    rows.push([
      o.queue_number != null ? o.queue_number : '',
      o.customer_code || '',
      o.customer_name || '',
      o.customer_phone || '',
      statusLabelOf(o.status || 'pending'),
      studentText,
      o.pickup_campus || '',
      o.pickup_location || '',
      pickupTimeText,
      itemsText,
      o.subtotal || 0,
      o.discount || 0,
      o.total || 0,
      o.note || '',
      orderTimeText
    ]);
  }

  var ws = XLSX.utils.aoa_to_sheet(rows);

  // Force "No WhatsApp" column (index 3) to be treated as TEXT, prevents scientific notation
  for(var r=1;r<rows.length;r++){
    var cellRef = XLSX.utils.encode_cell({r:r, c:3});
    if(ws[cellRef]) ws[cellRef].t = 's';
  }

  // Set sensible column widths (in characters)
  ws['!cols'] = [
    {wch:10}, {wch:12}, {wch:20}, {wch:15}, {wch:14},
    {wch:14}, {wch:12}, {wch:35}, {wch:22}, {wch:40},
    {wch:10}, {wch:10}, {wch:10}, {wch:25}, {wch:20}
  ];

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Orders');

  var dateStr = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'Milora_Orders_' + dateStr + '.xlsx');

  showToast('File Excel berhasil di-export!');
}

function loadOrders(){
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = 'Memuat...';

  sb.from('orders').select('*').order('created_at', { ascending: false }).then(function(res){
    btn.disabled = false;
    btn.textContent = 'Refresh';
    if(res.error){
      showToast('Gagal memuat data: ' + res.error.message);
      return;
    }
    currentOrders = res.data || [];
    renderStats();
    applyFilters();
  });
}

function applyFilters(){
  var searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  var statusVal = document.getElementById('statusFilter').value;

  filteredOrders = currentOrders.filter(function(o){
    var matchesStatus = (statusVal === 'all') || ((o.status || 'pending') === statusVal);
    if(!matchesStatus) return false;
    if(!searchTerm) return true;
    var haystack = ((o.customer_name||'') + ' ' + (o.customer_code||'') + ' ' + (o.customer_phone||'')).toLowerCase();
    return haystack.indexOf(searchTerm) > -1;
  });

  renderOrders();
}

function renderStats(){
  var totalOrders = currentOrders.length;
  var totalRevenue = 0;
  var totalItems = 0;
  for(var i=0;i<currentOrders.length;i++){
    totalRevenue += Number(currentOrders[i].total) || 0;
    var items = currentOrders[i].items;
    if(Array.isArray(items)) totalItems += items.length;
  }
  document.getElementById('stTotal').textContent = totalOrders;
  document.getElementById('stRev').textContent = rp(totalRevenue);
  document.getElementById('stItems').textContent = totalItems;
}

function dateKeyOf(dtStr){
  if(!dtStr) return null;
  try {
    var d = new Date(dtStr);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  } catch(e){ return null; }
}

function statusLabelOf(status){
  if(status === 'pending') return 'Baru';
  if(status === 'confirmed') return 'Dikonfirmasi';
  if(status === 'completed') return 'Selesai';
  if(status === 'no_show') return 'Tidak Diambil';
  if(status === 'cancelled') return 'Dibatalkan';
  return status;
}

function renderOrderCard(o){
  var status = o.status || 'pending';
  var statusLabel = statusLabelOf(status);
  var statusCls = 'status-' + status;

  var itemsHtml = '';
  if(Array.isArray(o.items)){
    for(var j=0;j<o.items.length;j++){
      var it = o.items[j];
      itemsHtml += (j+1) + '. ' + it.name;
      var extras = [];
      if(it.coating){
        var ct = it.coating;
        if(it.coatingPrice) ct += ' +' + rp(it.coatingPrice);
        extras.push(ct);
      }
      if(it.filling){
        var ft = it.filling;
        if(it.fillingPrice) ft += ' +' + rp(it.fillingPrice);
        extras.push(ft);
      }
      if(extras.length > 0){
        itemsHtml += ' <span class="oi-sauce">(' + extras.join(', ') + ')</span>';
      }
      itemsHtml += '<br>';
    }
  }

  var timeStr = '';
  try { timeStr = new Date(o.created_at).toLocaleString('id-ID'); } catch(e){ timeStr = o.created_at; }

  var proofHtml = o.proof_url
    ? '<img class="order-proof" src="' + o.proof_url + '" onclick="openLightbox(\'' + o.proof_url + '\')" alt="Bukti"/>'
    : '<div class="order-proof-missing">Tidak ada bukti</div>';

  var h = '';
  h += '<div class="order-card">';
  h += '<div class="order-top">';
  var waLink = formatWaLink(o.customer_phone);
  var studentBadge = '';
  if(o.is_student === true) studentBadge = '<span class="student-badge student-yes">Mahasiswa Gundar</span>';
  else if(o.is_student === false) studentBadge = '<span class="student-badge student-no">Non-Mahasiswa</span>';
  var queueBadge = (o.queue_number != null) ? '<span class="order-code" style="background:var(--wood);margin-left:6px;">No. ' + String(o.queue_number).padStart(3,'0') + '</span>' : '';
  h += '<div><span class="order-code">' + o.customer_code + '</span>' + queueBadge + studentBadge + '<div class="order-cust">' + o.customer_name + '</div>';
  if(o.customer_phone) h += '<div class="order-phone">' + o.customer_phone + '</div>';
  h += '<div class="order-time">' + timeStr + '</div></div>';
  h += '<span class="status-badge ' + statusCls + '">' + statusLabel + '</span>';
  h += '</div>';
  h += '<div class="order-body">';
  h += '<div><div class="order-items">' + itemsHtml + '</div>';
  if(o.pickup_campus || o.pickup_location || o.pickup_datetime){
    var pickupTimeStr = '';
    if(o.pickup_datetime){
      try {
        var dt = new Date(o.pickup_datetime);
        pickupTimeStr = dt.toLocaleString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'});
      } catch(e){ pickupTimeStr = o.pickup_datetime; }
    }
    h += '<div class="pickup-info">';
    if(o.pickup_campus) h += '<b>Pick Up:</b> ' + o.pickup_campus + '<br>';
    if(o.pickup_location) h += '<b>Alamat:</b> ' + o.pickup_location + '<br>';
    if(pickupTimeStr) h += '<b>Waktu:</b> ' + pickupTimeStr;
    h += '</div>';
  }
  if(o.note) h += '<div class="order-note">Catatan: ' + o.note + '</div>';
  h += '<div class="order-total-line">Total: ' + rp(o.total);
  if(o.discount > 0) h += ' <span style="font-size:11px;color:#2E7D32;font-weight:500;">(Diskon ' + rp(o.discount) + ')</span>';
  h += '</div></div>';
  h += proofHtml;
  h += '</div>';
  h += '<div class="order-actions">';
  h += '<button class="btn-status' + (status==='pending'?' active':'') + '" onclick="setStatus(' + o.id + ',\'pending\')">Baru</button>';
  h += '<button class="btn-status' + (status==='confirmed'?' active':'') + '" onclick="setStatus(' + o.id + ',\'confirmed\')">Dikonfirmasi</button>';
  h += '<button class="btn-status' + (status==='completed'?' active':'') + '" onclick="setStatus(' + o.id + ',\'completed\')">Selesai</button>';
  h += '<button class="btn-status neutral' + (status==='no_show'?' active':'') + '" onclick="setStatus(' + o.id + ',\'no_show\')">Tidak Diambil</button>';
  h += '<button class="btn-status danger' + (status==='cancelled'?' active':'') + '" onclick="setStatus(' + o.id + ',\'cancelled\')">Batalkan</button>';
  if(waLink) h += '<a class="btn-chat-wa" href="' + waLink + '" target="_blank">Chat WhatsApp</a>';
  h += '</div>';
  h += '</div>';
  return h;
}

function renderOrders(){
  var el = document.getElementById('ordersList');
  if(filteredOrders.length === 0){
    el.innerHTML = '<div class="empty-state"><div class="ei">&#128203;</div><p>Tidak ada pesanan yang cocok</p></div>';
    return;
  }

  var today = new Date();
  var todayKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  var tmr = new Date(today.getTime() + 86400000);
  var tomorrowKey = tmr.getFullYear() + '-' + String(tmr.getMonth()+1).padStart(2,'0') + '-' + String(tmr.getDate()).padStart(2,'0');

  var groups = {};
  var noDateGroup = [];

  for(var i=0;i<filteredOrders.length;i++){
    var o = filteredOrders[i];
    var key = dateKeyOf(o.pickup_datetime);
    if(!key){ noDateGroup.push(o); continue; }
    if(!groups[key]) groups[key] = [];
    groups[key].push(o);
  }

  var sortedKeys = Object.keys(groups).sort();

  var h = '';
  for(var k=0;k<sortedKeys.length;k++){
    var key = sortedKeys[k];
    var groupOrders = groups[key];
    var cls = 'later';
    var label = '';
    var dParts = key.split('-');
    var dObj = new Date(parseInt(dParts[0]), parseInt(dParts[1])-1, parseInt(dParts[2]));
    var formattedDate = dObj.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

    if(key === todayKey){ cls = 'today'; label = 'Hari Ini &mdash; ' + formattedDate; }
    else if(key === tomorrowKey){ cls = 'tomorrow'; label = 'Besok &mdash; ' + formattedDate; }
    else { label = formattedDate; }

    h += '<div class="date-group-header ' + cls + '">' + label + '<span class="date-group-count">' + groupOrders.length + ' pesanan</span></div>';
    for(var m=0;m<groupOrders.length;m++){
      h += renderOrderCard(groupOrders[m]);
    }
  }

  if(noDateGroup.length > 0){
    h += '<div class="date-group-header noinfo">Tanpa Info Pick Up<span class="date-group-count">' + noDateGroup.length + ' pesanan</span></div>';
    for(var n=0;n<noDateGroup.length;n++){
      h += renderOrderCard(noDateGroup[n]);
    }
  }

  el.innerHTML = h;
}

function statusNotifMessage(o, newStatus){
  var name = o.customer_name || 'Kak';
  var code = o.customer_code || '';
  if(newStatus === 'confirmed'){
    return 'Halo ' + name + '! \n\nPesanan kamu dengan kode *' + code + '* sudah kami *KONFIRMASI* \u2705\n\nPesanan sedang kami siapkan. Terima kasih sudah order di MeltyGo by Milora!';
  }
  if(newStatus === 'completed'){
    return 'Halo ' + name + '! \n\nPesanan kamu dengan kode *' + code + '* sudah *SELESAI* \u2705\n\nSilakan diambil sesuai jadwal pick up yang kamu pilih ya. Terima kasih sudah order di MeltyGo by Milora! \ud83d\ude4f';
  }
  return null;
}

function setStatus(orderId, newStatus){
  var order = null;
  for(var i=0;i<currentOrders.length;i++) if(currentOrders[i].id === orderId) order = currentOrders[i];

  sb.from('orders').update({ status: newStatus }).eq('id', orderId).then(function(res){
    if(res.error){
      showToast('Gagal update status');
      return;
    }
    showToast('Status diperbarui');

    if(order){
      var msg = statusNotifMessage(order, newStatus);
      var waLink = formatWaLink(order.customer_phone);
      if(msg && waLink){
        var fullLink = waLink + '?text=' + encodeURIComponent(msg);
        window.open(fullLink, '_blank');
      }
    }

    loadOrders();
  });
}

function openLightbox(url){
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}
</script>
